<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>fretboard</title>
    <!-- Select the wasm bin explicitly: `mic_probe` (src/bin/) is a native-only
         tool and must not be the trunk artifact. Without this, trunk errors on
         the ambiguous multi-bin target set. -->
    <link data-trunk rel="rust" data-bin="fretboard-app" />
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #1a1a1a;
        }
        canvas {
            width: 100% !important;
            height: 100% !important;
        }
    </style>
</head>
<body>
    <canvas id="fretboard_canvas"></canvas>
</body>
</html>
